<!--
This website is a Greatest Number Checker application.
It allows the user to enter three numbers and determines which number is the greatest.
I created this to demonstrate how JavaScript can compare values and display the result on a webpage.
-->

<!DOCTYPE html>
<html>
<head>
<title>Greatest Number Checker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Greatest Number Checker</h1>
<p>Johann O. Gultiano</p>

<input type="number" id="num1" placeholder="First number"><br>
<input type="number" id="num2" placeholder="Second number"><br>
<input type="number" id="num3" placeholder="Third number"><br>

<button onclick="findGreatest()">Find Greatest</button>
<p id="result"></p>

<script src="script.js"></script>
</body>
</html>
